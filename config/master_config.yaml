      - one_liner_summary
      - description
      - url
      - screenings
      - review_confidence
    required_on_publish:
      - title
      - dates
      - times
      - rating
      - one_liner_summary
      - description
      - program
      - screenings
    field_definitions:
      review_confidence:
        type: string
