<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Austin Culture Calendar — v11h (NYT Book Review)</title>
  <link rel="stylesheet" href="../_shared/reset.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="masthead">
    <div class="masthead-inner">
      <h1 class="masthead-title">The Austin Culture Tipsheet</h1>
      <p class="masthead-subtitle">Critic's picks, sorted by merit. Click any event for the hook.</p>
    </div>
  </header>
  <div class="layout-container">
    <aside class="sidebar">
      <section class="picks-section" id="picks" aria-label="Top 10 picks of the week">
        <h2 class="picks-heading">Top 10 Picks</h2>
        <ol class="picks-list" id="picks-list"></ol>
      </section>
    </aside>
    <main class="main-content">
      <div class="content-header">
        <h2 class="listings-heading">All Events — Sorted by Rating</h2>
      </div>
      <div class="listings-container" id="listings" aria-label="All events by rating"></div>
    </main>
  </div>
  <div class="status" id="loading">Loading events&hellip;</div>
  <div class="status error" id="error" hidden></div>
  <script src="script.js"></script>
</body>
</html>
