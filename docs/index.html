<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Austin Culture Calendar</title>
  <link rel="stylesheet" href="variants/_shared/reset.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="masthead">
    <div class="masthead-inner">
      <h1 class="masthead-title">The Austin Culture Tipsheet</h1>
      <p class="masthead-subtitle">Critic's picks, sorted by merit. Click any event for the hook.</p>
    </div>
  </header>
  <div class="search-bar" role="search">
    <label class="search-label" for="search-input">Search events</label>
    <input
      id="search-input"
      class="search-input"
      type="search"
      placeholder="Search events"
      autocomplete="off"
      aria-label="Search events by title"
    >
  </div>
  <div class="filter-row" id="venue-filters" role="group" aria-label="Filter by venue"></div>
  <div class="filter-row filter-row--category" id="category-filters" role="group" aria-label="Filter by category"></div>
  <div class="filter-status" id="filter-status" aria-live="polite">
    <span class="filter-count" id="filter-count"></span>
    <button class="filter-clear" id="filter-clear" type="button" hidden>Clear all filters</button>
  </div>
  <section class="picks-section" id="picks" aria-label="Top 10 picks of the week">
    <h2 class="picks-heading">Top 10 Picks of the Week</h2>
    <ol class="picks-list" id="picks-list"></ol>
  </section>
  <main class="listings" id="listings" aria-label="All events by rating">
    <h2 class="listings-heading">All Events — Sorted by Rating</h2>
  </main>
  <div class="status" id="loading" role="status" aria-live="polite">Loading events&hellip;</div>
  <div class="status error" id="error" role="alert" hidden></div>
  <script src="script.js"></script>
</body>
</html>
