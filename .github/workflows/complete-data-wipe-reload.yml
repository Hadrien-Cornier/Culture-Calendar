name: Complete Batch Reload

on:
  # Manual only — this wipes cache and re-runs every LLM call.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  complete-reload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest changes
        run: git pull origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Wipe cached data
        run: |
          echo "Wiping docs/data.json and cache/"
          rm -f docs/data.json
          rm -f docs/source_update_times.json
          rm -rf cache/

      - name: Complete batch reload (force-reprocess all ratings)
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python update_website_data.py --force-reprocess --validate

      - name: End-to-end verification
        run: |
          python scripts/verify_calendar.py --offline

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Complete Reload"

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add docs/data.json docs/source_update_times.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Complete batch reload - $(date -u +%Y-%m-%d)"
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          fi
