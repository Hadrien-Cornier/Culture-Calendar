name: Persona critique (post-deploy)

# Gate A of the hybrid persona gate (see CLAUDE.md: "Persona critique
# gate"). Runs on every push to main that touches docs/ (excluding our
# own audit output). Waits for GitHub Pages to serve the new commit, then
# runs scripts/persona_critique.py against the deployed site and commits
# the scorecard to docs/personas-history/<sha>.md. Non-blocking — the push
# already succeeded by the time this workflow runs.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '!docs/personas-history/**'
      - '!docs/PERSONAS.md'
      - '!docs/PERSONAS-fast.md'
      - '!docs/persona_model_benchmark.md'

concurrency:
  group: persona-audit
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip persona-audit]')"
    steps:
      - name: Checkout (full history so revert flows work)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chromium (system-wide, avoids pyppeteer bundled download)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          echo "PYPPETEER_EXECUTABLE_PATH=$(command -v chromium-browser || command -v chromium)" >> $GITHUB_ENV

      - name: Wait for GitHub Pages to serve the pushed commit
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # Poll until the deployed script.js (or index.html fallback) contains
          # text unique to this commit — use the commit SHA as the probe token
          # by checking against the raw diff of docs/ files.
          #
          # Conservative approach: poll the served index.html; compare against
          # the committed version. 5 min timeout; 15 s cadence.
          set -eu
          deadline=$((SECONDS + 300))
          changed=$(git diff-tree --no-commit-id --name-only -r "$COMMIT_SHA" -- 'docs/*' | head -1)
          if [ -z "$changed" ]; then
            echo "No docs/ files in commit; skipping deploy wait."
            exit 0
          fi
          local_bytes=$(wc -c < "$changed")
          url="https://hadrien-cornier.github.io/Culture-Calendar/${changed#docs/}"
          echo "Polling $url until size matches $local_bytes bytes (or content matches)..."
          while [ $SECONDS -lt $deadline ]; do
            remote_bytes=$(curl -sfI "$url" | awk -F': ' 'tolower($1)=="content-length"{gsub(/\r/,"");print $2}' | tail -1)
            if [ -n "$remote_bytes" ] && [ "$remote_bytes" = "$local_bytes" ]; then
              echo "Deploy settled at ${SECONDS}s."
              exit 0
            fi
            sleep 15
          done
          echo "::warning::Deploy wait timed out after 5 min; proceeding with audit anyway."

      - name: Run persona critique (LLM council)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p docs/personas-history
          out="docs/personas-history/${{ github.sha }}.md"
          python scripts/persona_critique.py --out "$out"
          # Also update the "latest" rolling file
          cp "$out" docs/PERSONAS.md

      - name: Commit audit result back to main
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -eu
          if git diff --quiet docs/personas-history/ docs/PERSONAS.md; then
            echo "No changes to commit; audit produced empty diff."
            exit 0
          fi
          git add docs/personas-history/ docs/PERSONAS.md
          git commit -m "chore(personas): post-deploy audit for ${{ github.sha }} [skip persona-audit]"
          # Retry push on race with concurrent main pushes (up to 3 tries).
          for attempt in 1 2 3; do
            if git push origin main; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing."
            git pull --rebase origin main
          done
          echo "::error::Could not push audit result after 3 attempts."
          exit 1

      - name: Upload audit as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: persona-audit-${{ github.sha }}
          path: |
            docs/personas-history/${{ github.sha }}.md
            .overnight/persona-costs.jsonl
          if-no-files-found: warn
          retention-days: 30
