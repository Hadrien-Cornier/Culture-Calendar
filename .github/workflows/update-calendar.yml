name: Weekly Incremental Update

on:
  schedule:
    # Saturday 9 PM UTC (4 PM CST / 3 PM CDT in Austin)
    - cron: '0 21 * * 6'
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Optional: subscribe this address and send the tipsheet to it (test mode)'
        required: false
        type: string
      inspect_only:
        description: 'Skip the pipeline; only print Buttondown newsletter settings'
        required: false
        type: boolean
        default: false
      buttondown_patch:
        description: 'Optional JSON object to PATCH into the Buttondown newsletter settings'
        required: false
        type: string

permissions:
  contents: write
  issues: write  # failure-alert step opens/comments on a rolling issue

jobs:
  weekly-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest changes
        # Best-effort: pick up any commits that landed on main since this run
        # was queued. This must never abort the job — on a workflow_dispatch
        # against a feature branch the shallow checkout shares no history with
        # main ("refusing to merge unrelated histories" / "divergent
        # branches"), so fall back to the already-checked-out ref. On a
        # scheduled run against main it's a no-op fast-forward.
        run: git pull --no-edit --no-rebase origin main || echo "Skipping pull; using checked-out ref"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright

      - name: Install Playwright Chromium
        # Needed by AlienatedMajesty scraper (book-clubs page is JS-rendered).
        # --with-deps installs the system libs Chromium needs on ubuntu-latest.
        run: python -m playwright install --with-deps chromium

      - name: Run weekly incremental update
        if: ${{ !inputs.inspect_only }}
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          # OpenRouter is the preferred LLM provider (cheaper); Anthropic stays
          # as an automatic fallback when OPENROUTER_API_KEY is unset.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Running weekly incremental update"
          python update_website_data.py --validate

      - name: Verify update results
        if: ${{ !inputs.inspect_only }}
        run: |
          python scripts/verify_calendar.py --offline

      - name: Configure Git
        if: ${{ !inputs.inspect_only }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Weekly Update"

      - name: Commit and push changes
        if: ${{ !inputs.inspect_only }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Commit only the canonical data/cache to main. The full site
          # (incl. docs/weekly/) is rebuilt and published to gh-pages by
          # deploy-pages.yml, which this push to main triggers.
          git add docs/data.json docs/source_update_times.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly incremental update - $(date -u +%Y-%m-%d)"
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          fi

      - name: Send weekly tipsheet email
        # Sends next week's top picks to Buttondown subscribers. Runs after the
        # data push so an email failure can never block publishing. Idempotent
        # (deterministic per-week subject); no-ops cleanly until
        # BUTTONDOWN_API_KEY is added to repo secrets. With the test_email
        # dispatch input, subscribes that address first and sends to it.
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          TEST_EMAIL: ${{ inputs.test_email }}
        run: |
          if [ "${{ inputs.inspect_only }}" = "true" ]; then
            python scripts/send_weekly_email.py --inspect
          elif [ -n "${{ inputs.buttondown_patch }}" ]; then
            python scripts/send_weekly_email.py --patch '${{ inputs.buttondown_patch }}'
          elif [ -n "$TEST_EMAIL" ]; then
            python scripts/send_weekly_email.py --to "$TEST_EMAIL"
          else
            python scripts/send_weekly_email.py
          fi

      - name: Alert on failure via GitHub issue
        # The pipeline must never fail silently again (it once failed daily for
        # 17 days unnoticed). Opens one rolling issue and comments on repeats.
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create pipeline-failure --color d73a4a --description "Automated pipeline failure alert" --force || true
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EXISTING=$(gh issue list --label pipeline-failure --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "🔁 ${{ github.workflow }} failed again on $(date -u '+%Y-%m-%d %H:%M UTC'). Run: $RUN_URL"
          else
            gh issue create --title "🚨 ${{ github.workflow }} is failing" --label pipeline-failure --body "The pipeline failed on $(date -u '+%Y-%m-%d %H:%M UTC').

            Run: $RUN_URL

            This issue was auto-created. Each subsequent failure adds a comment; close it once the pipeline is green again."
          fi

      - name: Trigger self-healing agent
        # GitHub doesn't fire `issues` events for GITHUB_TOKEN actions, so
        # the self-heal workflow can't trigger on the issue we just created.
        # Dispatch it directly instead.
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run self-heal.yml -f run_id=${{ github.run_id }} || true
