name: Weekly Incremental Update

on:
  schedule:
    # Saturday 9 PM UTC (4 PM CST / 3 PM CDT in Austin)
    - cron: '0 21 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest changes
        run: git pull origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright

      - name: Install Playwright Chromium
        # Needed by AlienatedMajesty scraper (book-clubs page is JS-rendered).
        # --with-deps installs the system libs Chromium needs on ubuntu-latest.
        run: python -m playwright install --with-deps chromium

      - name: Run weekly incremental update
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Running weekly incremental update"
          python update_website_data.py --validate

      - name: Verify update results
        run: |
          python scripts/verify_calendar.py --offline

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Weekly Update"

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add docs/data.json docs/source_update_times.json docs/weekly/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly incremental update - $(date -u +%Y-%m-%d)"
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          fi
