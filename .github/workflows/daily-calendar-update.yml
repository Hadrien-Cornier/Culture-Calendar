name: Daily Incremental Update

on:
  schedule:
    # Every day at 11:00 UTC (6 AM CST / 5 AM CDT in Austin), before the
    # workday. Incremental: only newly discovered events are AI-processed, so
    # most days are cheap cache hits. Keeps the site from drifting stale between
    # the Saturday weekly run and the monthly classical refresh.
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write  # failure-alert step opens/comments on a rolling issue

jobs:
  daily-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest changes
        # Best-effort; no-op fast-forward on a scheduled main run, and must not
        # abort the job when a workflow_dispatch runs on a diverged branch.
        run: git pull --no-edit --no-rebase origin main || echo "Skipping pull; using checked-out ref"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright

      - name: Install Playwright Chromium
        # Needed by AlienatedMajesty scraper (book-clubs page is JS-rendered).
        run: python -m playwright install --with-deps chromium

      - name: Run daily incremental update
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          # OpenRouter is the preferred LLM provider (cheaper); Anthropic stays
          # as an automatic fallback when OPENROUTER_API_KEY is unset.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Running daily incremental update (~2-week recurring horizon)"
          python update_website_data.py --test-week --validate

      - name: Verify update results
        run: |
          python scripts/verify_calendar.py --offline

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Daily Update"

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add docs/data.json docs/source_update_times.json docs/weekly/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily incremental update - $(date -u +%Y-%m-%d)"
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          fi

      - name: Alert on failure via GitHub issue
        # The pipeline must never fail silently again (it once failed daily for
        # 17 days unnoticed). Opens one rolling issue and comments on repeats.
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create pipeline-failure --color d73a4a --description "Automated pipeline failure alert" --force || true
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EXISTING=$(gh issue list --label pipeline-failure --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "🔁 ${{ github.workflow }} failed again on $(date -u '+%Y-%m-%d %H:%M UTC'). Run: $RUN_URL"
          else
            gh issue create --title "🚨 ${{ github.workflow }} is failing" --label pipeline-failure --body "The pipeline failed on $(date -u '+%Y-%m-%d %H:%M UTC').

            Run: $RUN_URL

            This issue was auto-created. Each subsequent failure adds a comment; close it once the pipeline is green again."
          fi

      - name: Trigger self-healing agent
        # GitHub doesn't fire `issues` events for GITHUB_TOKEN actions, so
        # the self-heal workflow can't trigger on the issue we just created.
        # Dispatch it directly instead.
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run self-heal.yml -f run_id=${{ github.run_id }} || true
