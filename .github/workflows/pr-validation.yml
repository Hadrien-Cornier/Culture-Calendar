name: PR Validation Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality (Black)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black

      - name: Black formatting check
        run: black --check --diff src/ tests/ *.py || true  # non-blocking for now

  test-suite:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13']
    name: Test Suite (Python ${{ matrix.python-version }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run unit + integration tests
        # Oracle + scraper integration tests mock the network, so no keys needed.
        run: |
          python -m pytest tests/ -q --tb=short

  offline-verify:
    runs-on: ubuntu-latest
    name: Offline end-to-end verify
    needs: [test-suite]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: scripts/verify_calendar.py --offline
        # Runs scraper against saved HTML fixtures + checks docs/data.json
        # schema/oracle coverage/no-refusal. No network, no LLM keys needed.
        run: python scripts/verify_calendar.py --offline

  scraper-smoke:
    runs-on: ubuntu-latest
    name: Scraper initialization smoke test
    needs: [test-suite]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: MultiVenueScraper initializes
        run: |
          python -c "
          from src.scraper import MultiVenueScraper
          scraper = MultiVenueScraper()
          for name in [
              'afs_scraper',
              'hyperreal_scraper',
              'paramount_scraper',
              'alienated_majesty_scraper',
              'first_light_scraper',
              'austin_symphony_scraper',
              'austin_opera_scraper',
              'austin_chamber_music_scraper',
              'early_music_scraper',
              'la_follia_scraper',
              'ballet_austin_scraper',
          ]:
              assert getattr(scraper, name) is not None, f'{name} missing'
              print(f'OK {name}')
          "

  council-review:
    runs-on: ubuntu-latest
    name: LLM Council (cross-family diff review)
    needs: [test-suite]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need base..head for the diff

      - name: Capture PR diff as council context
        run: |
          mkdir -p .council
          git fetch --no-tags --depth=200 origin "${{ github.base_ref }}" || git fetch --no-tags origin "${{ github.base_ref }}"
          # Review the meaningful surface only: exclude generated artifacts, the
          # large data/cache JSON, and the lockfile (noise that drowns the diff
          # and bloats the model prompt). Then cap to keep the prompt bounded.
          git diff --no-color "origin/${{ github.base_ref }}...${{ github.sha }}" -- . \
            ':(exclude)docs/events/**' ':(exclude)docs/people/**' ':(exclude)docs/venues/**' \
            ':(exclude)docs/weekly/**' ':(exclude)docs/api/**' ':(exclude)docs/og/**' \
            ':(exclude)docs/*.json' ':(exclude)package-lock.json' \
            > .council/pr-diff.full.txt || true
          head -c 200000 .council/pr-diff.full.txt > .council/pr-diff.txt
          echo "diff bytes (capped): $(wc -c < .council/pr-diff.txt) of $(wc -c < .council/pr-diff.full.txt) total"

      - name: Council gate (cross-family; blocks on REJECT/ESCALATE)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "::notice title=LLM Council::OPENROUTER_API_KEY absent (fork PR or secret unset) — council skipped (neutral)."
            exit 0
          fi
          if [ ! -s .council/pr-diff.txt ]; then
            echo "::notice title=LLM Council::empty review surface (only generated/data files changed) — nothing to review."
            exit 0
          fi
          rc=0
          bash .council/llm-council/scripts/council-judge.sh \
            --council .council/culture-calendar.json \
            --context-file .council/pr-diff.txt \
            --reviews-dir .council/pr-reviews || rc=$?
          {
            echo "## LLM Council (cross-family) — exit $rc (0=ACCEPT, 1=REJECT, 2=ESCALATE)"
            if [ -f .council/pr-reviews/aggregate-verdict.json ]; then
              echo '```json'; cat .council/pr-reviews/aggregate-verdict.json; echo; echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$rc" -eq 1 ]; then
            echo "::error title=LLM Council::REJECT — a juror blocked the change. See the job summary / .council/pr-reviews/."
          elif [ "$rc" -eq 2 ]; then
            echo "::error title=LLM Council::ESCALATE — no consensus (all abstained or dispatch failed). May be transient; re-run, or inspect .council/pr-reviews/."
          fi
          # Blocking: the council decision gates the check.
          exit "$rc"

  pr-summary:
    runs-on: ubuntu-latest
    name: PR Validation Summary
    needs: [code-quality, test-suite, offline-verify, scraper-smoke, council-review]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## PR Validation Results" >> $GITHUB_STEP_SUMMARY
          for job in code-quality test-suite offline-verify scraper-smoke council-review; do
            case $job in
              code-quality) result="${{ needs.code-quality.result }}" ;;
              test-suite) result="${{ needs.test-suite.result }}" ;;
              offline-verify) result="${{ needs.offline-verify.result }}" ;;
              scraper-smoke) result="${{ needs.scraper-smoke.result }}" ;;
              council-review) result="${{ needs.council-review.result }}" ;;
            esac
            if [[ "$result" == "success" ]]; then
              echo "- ✅ $job" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ $job ($result)" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Fail overall if required jobs failed.
          if [[ "${{ needs.test-suite.result }}" != "success" ]] || [[ "${{ needs.offline-verify.result }}" != "success" ]] || [[ "${{ needs.scraper-smoke.result }}" != "success" ]]; then
            exit 1
          fi
