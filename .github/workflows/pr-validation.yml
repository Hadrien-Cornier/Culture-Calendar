name: PR Validation Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality (Black)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black

      - name: Black formatting check
        run: black --check --diff src/ tests/ *.py || true  # non-blocking for now

  test-suite:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13']
    name: Test Suite (Python ${{ matrix.python-version }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run unit + integration tests
        # Oracle + scraper integration tests mock the network, so no keys needed.
        run: |
          python -m pytest tests/ -q --tb=short

  offline-verify:
    runs-on: ubuntu-latest
    name: Offline end-to-end verify
    needs: [test-suite]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: scripts/verify_calendar.py --offline
        # Runs scraper against saved HTML fixtures + checks docs/data.json
        # schema/oracle coverage/no-refusal. No network, no LLM keys needed.
        run: python scripts/verify_calendar.py --offline

  scraper-smoke:
    runs-on: ubuntu-latest
    name: Scraper initialization smoke test
    needs: [test-suite]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: MultiVenueScraper initializes
        run: |
          python -c "
          from src.scraper import MultiVenueScraper
          scraper = MultiVenueScraper()
          for name in [
              'afs_scraper',
              'hyperreal_scraper',
              'paramount_scraper',
              'alienated_majesty_scraper',
              'first_light_scraper',
              'austin_symphony_scraper',
              'austin_opera_scraper',
              'austin_chamber_music_scraper',
              'early_music_scraper',
              'la_follia_scraper',
              'ballet_austin_scraper',
          ]:
              assert getattr(scraper, name) is not None, f'{name} missing'
              print(f'OK {name}')
          "

  council-review:
    runs-on: ubuntu-latest
    name: LLM Council (cross-family diff review)
    needs: [test-suite]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need base..head for the diff

      - name: Capture PR diff as council context
        run: |
          mkdir -p .council
          git fetch --no-tags --depth=200 origin "${{ github.base_ref }}" || git fetch --no-tags origin "${{ github.base_ref }}"
          # Review the meaningful surface only: exclude generated artifacts, the
          # large data/cache JSON, and the lockfile (noise that drowns the diff
          # and bloats the model prompt). Then cap to keep the prompt bounded.
          git diff --no-color "origin/${{ github.base_ref }}...${{ github.sha }}" -- . \
            ':(exclude)docs/events/**' ':(exclude)docs/people/**' ':(exclude)docs/venues/**' \
            ':(exclude)docs/weekly/**' ':(exclude)docs/api/**' ':(exclude)docs/og/**' \
            ':(exclude)docs/*.json' ':(exclude)package-lock.json' \
            > .council/pr-diff.full.txt || true
          head -c 200000 .council/pr-diff.full.txt > .council/pr-diff.txt
          echo "diff bytes (capped): $(wc -c < .council/pr-diff.txt) of $(wc -c < .council/pr-diff.full.txt) total"

      - name: Council gate (cross-family; blocks on REJECT/ESCALATE)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "::notice title=LLM Council::OPENROUTER_API_KEY absent (fork PR or secret unset) — council skipped (neutral)."
            exit 0
          fi
          if [ ! -s .council/pr-diff.txt ]; then
            echo "::notice title=LLM Council::empty review surface (only generated/data files changed) — nothing to review."
            exit 0
          fi
          rc=0
          # --council-judge prints per-juror summary + findings + dispatch meta
          # to stderr; tee it so the reasoning lands in the job log (not just
          # PASS/FAIL), then mirror the structured reviews into the log + summary.
          bash .council/llm-council/scripts/council-judge.sh \
            --council .council/culture-calendar.json \
            --context-file .council/pr-diff.txt \
            --reviews-dir .council/pr-reviews || rc=$?

          # --- Per-juror reasoning, straight into the job log (the thing
          #     `gh run view --log` shows). Each verdict carries why it landed.
          echo "::group::LLM Council — per-juror reviews"
          for f in .council/pr-reviews/*.json; do
            [ "$f" = ".council/pr-reviews/aggregate-verdict.json" ] && continue
            [ -f "$f" ] || continue
            echo "----- $(basename "$f") -----"
            jq -r '
              "verdict: \(.verdict // "?")   model: \(._meta.model // "?")   " +
              (if ._meta.dispatch_failed then "DISPATCH FAILED" else "http=\(._meta.http_status // "?") finish=\(._meta.finish_reason // "?") latency_ms=\(._meta.latency_ms // "?")" end),
              "summary: \(.summary // "")",
              ( (.findings // []) | to_entries[]
                | "  - [\(.value.severity // "?")/\(.value.code // "NO_CODE")] \(.value.evidence // "")\n      fix: \(.value.suggested_fix // "")" )
            ' "$f" 2>/dev/null || cat "$f"
            echo
          done
          echo "::endgroup::"

          # --- Job summary: the aggregate decision + a readable per-juror table.
          {
            echo "## LLM Council (cross-family) — exit $rc (0=ACCEPT, 1=REJECT, 2=ESCALATE)"
            if [ -f .council/pr-reviews/aggregate-verdict.json ]; then
              echo "### Verdict"
              jq -r '"**\(.decision)**" + (if .dissenting_personas then " — dissenters: \(.dissenting_personas)" elif .passing_personas then " — passed: \(.passing_personas)" else "" end)' \
                .council/pr-reviews/aggregate-verdict.json 2>/dev/null || true
              echo
              echo "### Per-juror"
              jq -r '
                (.reviews // [])[]
                | "<details><summary>\(.persona) — **\(.verdict)** (\(.model // "?"))\(if .dispatch_failed then " — DISPATCH FAILED" else "" end)</summary>\n\n\(.summary // "")\n\n"
                  + ((.findings // []) | map("- `[\(.severity // "?")/\(.code // "NO_CODE")]` \(.evidence // "")\n  - fix: \(.suggested_fix // "")") | join("\n"))
                  + "\n</details>"' \
                .council/pr-reviews/aggregate-verdict.json 2>/dev/null || true
              echo
              echo "<details><summary>Raw aggregate-verdict.json</summary>"
              echo; echo '```json'; cat .council/pr-reviews/aggregate-verdict.json; echo; echo '```'; echo '</details>'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$rc" -eq 1 ]; then
            echo "::error title=LLM Council::REJECT — a juror blocked the change. Reasons are in the 'per-juror reviews' log group, the job summary, and the uploaded council-reviews artifact."
          elif [ "$rc" -eq 2 ]; then
            echo "::error title=LLM Council::ESCALATE — no consensus (all abstained or dispatch failed). Often transient (model timeout); re-run, or inspect the per-juror log group / artifact."
          fi
          # Blocking: the council decision gates the check.
          exit "$rc"

      - name: Upload council reviews (prompts, raw responses, verdicts)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: council-reviews
          path: .council/pr-reviews/
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment council verdict on PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          [ -f .council/pr-reviews/aggregate-verdict.json ] || exit 0
          body=$(jq -r '
            "## 🏛️ LLM Council — **\(.decision)**\n"
            + (if .dissenting_personas then "Dissenters: `\(.dissenting_personas)`\n" elif .passing_personas then "Passed: `\(.passing_personas)`\n" else "" end)
            + "\n"
            + ((.reviews // []) | map(
                "### \(.persona) — **\(.verdict)** (`\(.model // "?")`)\(if .dispatch_failed then " — ⚠️ dispatch failed" else "" end)\n"
                + "\(.summary // "")\n"
                + ((.findings // []) | map("- **[\(.severity // "?")/\(.code // "NO_CODE")]** \(.evidence // "")\n  - _fix:_ \(.suggested_fix // "")") | join("\n"))
              ) | join("\n\n"))
            + "\n\n_Re-run this job if the failure looks transient (a juror model timed out). Full prompts + raw responses are in the `council-reviews` artifact._"
          ' .council/pr-reviews/aggregate-verdict.json)
          gh pr comment "${{ github.event.pull_request.number }}" --body "$body" || \
            echo "::notice title=LLM Council::could not post PR comment (token scope?) — verdict is in the job summary."

  pr-summary:
    runs-on: ubuntu-latest
    name: PR Validation Summary
    needs: [code-quality, test-suite, offline-verify, scraper-smoke, council-review]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## PR Validation Results" >> $GITHUB_STEP_SUMMARY
          for job in code-quality test-suite offline-verify scraper-smoke council-review; do
            case $job in
              code-quality) result="${{ needs.code-quality.result }}" ;;
              test-suite) result="${{ needs.test-suite.result }}" ;;
              offline-verify) result="${{ needs.offline-verify.result }}" ;;
              scraper-smoke) result="${{ needs.scraper-smoke.result }}" ;;
              council-review) result="${{ needs.council-review.result }}" ;;
            esac
            if [[ "$result" == "success" ]]; then
              echo "- ✅ $job" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ $job ($result)" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Fail overall if required jobs failed.
          if [[ "${{ needs.test-suite.result }}" != "success" ]] || [[ "${{ needs.offline-verify.result }}" != "success" ]] || [[ "${{ needs.scraper-smoke.result }}" != "success" ]]; then
            exit 1
          fi
