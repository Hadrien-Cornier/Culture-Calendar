name: PR Validation Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality (Black)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black

      - name: Black formatting check
        run: black --check --diff src/ tests/ *.py || true  # non-blocking for now

  test-suite:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13']
    name: Test Suite (Python ${{ matrix.python-version }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run unit + integration tests
        # Oracle + scraper integration tests mock the network, so no keys needed.
        run: |
          python -m pytest tests/ -q --tb=short

  offline-verify:
    runs-on: ubuntu-latest
    name: Offline end-to-end verify
    needs: [test-suite]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: scripts/verify_calendar.py --offline
        # Runs scraper against saved HTML fixtures + checks docs/data.json
        # schema/oracle coverage/no-refusal. No network, no LLM keys needed.
        run: python scripts/verify_calendar.py --offline

  scraper-smoke:
    runs-on: ubuntu-latest
    name: Scraper initialization smoke test
    needs: [test-suite]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: MultiVenueScraper initializes
        run: |
          python -c "
          from src.scraper import MultiVenueScraper
          scraper = MultiVenueScraper()
          for name in [
              'afs_scraper',
              'hyperreal_scraper',
              'paramount_scraper',
              'alienated_majesty_scraper',
              'first_light_scraper',
              'austin_symphony_scraper',
              'austin_opera_scraper',
              'austin_chamber_music_scraper',
              'early_music_scraper',
              'la_follia_scraper',
              'ballet_austin_scraper',
          ]:
              assert getattr(scraper, name) is not None, f'{name} missing'
              print(f'OK {name}')
          "

  pr-summary:
    runs-on: ubuntu-latest
    name: PR Validation Summary
    needs: [code-quality, test-suite, offline-verify, scraper-smoke]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## PR Validation Results" >> $GITHUB_STEP_SUMMARY
          for job in code-quality test-suite offline-verify scraper-smoke; do
            case $job in
              code-quality) result="${{ needs.code-quality.result }}" ;;
              test-suite) result="${{ needs.test-suite.result }}" ;;
              offline-verify) result="${{ needs.offline-verify.result }}" ;;
              scraper-smoke) result="${{ needs.scraper-smoke.result }}" ;;
            esac
            if [[ "$result" == "success" ]]; then
              echo "- ✅ $job" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ $job ($result)" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Fail overall if required jobs failed.
          if [[ "${{ needs.test-suite.result }}" != "success" ]] || [[ "${{ needs.offline-verify.result }}" != "success" ]] || [[ "${{ needs.scraper-smoke.result }}" != "success" ]]; then
            exit 1
          fi
