name: Self-Healing Agent

# Automatically diagnoses and fixes pipeline failures.
# Triggers when a pipeline-failure issue is opened, and runs a daily
# health check for content freshness.

on:
  issues:
    types: [opened, labeled]
  schedule:
    # Daily health check at 10:00 UTC (5 AM CT), before the daily pipeline
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to heal from"
        required: false
        type: string
      run_id:
        description: "Workflow run ID to heal from"
        required: false
        type: string
      health_check:
        description: "Run health check only"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  self-heal:
    runs-on: ubuntu-latest
    # Only run for pipeline-failure issues or manual dispatch or schedule
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'pipeline-failure'))
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic requests python-dotenv pyyaml beautifulsoup4 pytest

      - name: Run self-healing agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python scripts/self_heal.py --health-check
          elif [ -n "${{ inputs.issue_number }}" ]; then
            python scripts/self_heal.py --issue ${{ inputs.issue_number }}
          elif [ -n "${{ inputs.run_id }}" ]; then
            python scripts/self_heal.py --run ${{ inputs.run_id }}
          elif [ "${{ inputs.health_check }}" = "true" ]; then
            python scripts/self_heal.py --health-check
          elif [ "${{ github.event_name }}" = "issues" ]; then
            python scripts/self_heal.py --issue ${{ github.event.issue.number }}
          else
            python scripts/self_heal.py --health-check
          fi
